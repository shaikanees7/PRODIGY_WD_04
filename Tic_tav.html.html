<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tic Tac Toe</title>
    <link rel="stylesheet" href="styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;700&family=Outfit:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="app">
      <header class="header">
        <h1 class="title">Tic Tac Toe</h1>
        <p class="subtitle">Three in a row wins — play a friend or the computer</p>
      </header>

      <main class="main">
        <section class="panel" aria-label="Game options">
          <div class="mode-row" role="group" aria-label="Game mode">
            <span class="label">Mode</span>
            <div class="segmented">
              <button
                type="button"
                class="seg-btn is-active"
                id="mode-pvp"
                aria-pressed="true"
              >
                2 players
              </button>
              <button type="button" class="seg-btn" id="mode-pvc" aria-pressed="false">
                vs computer
              </button>
            </div>
          </div>
          <p class="hint" id="mode-hint">You are X, friend is O. X goes first.</p>
        </section>

        <div
          class="status"
          id="status"
          role="status"
          aria-live="polite"
          aria-atomic="true"
        >
          X’s turn
        </div>

        <div
          class="board"
          id="board"
          role="grid"
          aria-label="Tic tac toe board"
        >
          <button type="button" class="cell" data-index="0" aria-label="Cell 1 empty"></button>
          <button type="button" class="cell" data-index="1" aria-label="Cell 2 empty"></button>
          <button type="button" class="cell" data-index="2" aria-label="Cell 3 empty"></button>
          <button type="button" class="cell" data-index="3" aria-label="Cell 4 empty"></button>
          <button type="button" class="cell" data-index="4" aria-label="Cell 5 empty"></button>
          <button type="button" class="cell" data-index="5" aria-label="Cell 6 empty"></button>
          <button type="button" class="cell" data-index="6" aria-label="Cell 7 empty"></button>
          <button type="button" class="cell" data-index="7" aria-label="Cell 8 empty"></button>
          <button type="button" class="cell" data-index="8" aria-label="Cell 9 empty"></button>
        </div>

        <div class="actions">
          <button type="button" class="btn btn-primary" id="btn-new-game">New game</button>
        </div>
      </main>
    </div>
    <script src="app.js"></script>
  </body>
</html>
